aid: northern-trust
name: Northern Trust
kind: company
type: Index
description: >-
  Northern Trust is a Fortune 500 global financial services firm providing asset
  servicing, asset management, wealth management, and banking to corporations,
  institutions, family offices, and individuals worldwide. Its first-party
  developer program, the Northern Trust API Store at developer.ntrs.com, exposes
  asset-servicing capabilities as REST APIs across custody, fund accounting,
  transfer agency, middle office, data management, and risk and performance,
  plus an event-notification service. The catalog is a partner/registration
  surface: browsing product domains is public, but API reference specifications
  (downloadable as spec.json) and live access sit behind Okta-based OIDC login.
  Northern Trust does not publish a public consumer open-banking API; retail
  account connectivity is reached indirectly through data aggregators.
