- aid: northern-trust:event-notification-api
  name: Northern Trust Event Notification API
  description: >-
    The Event Notification service in the Northern Trust API Store lets registered
    clients subscribe to and receive asynchronous notifications about events
    across their custody and servicing data — a webhook/event-driven layer that
    complements the request/response asset-servicing APIs. Subscription and
    event-notification setup are managed inside the developer portal behind Okta
    authentication. It is delivered through the enterprise API gateway alongside
    the other product domains.
  humanURL: https://developer.ntrs.com/events
  baseURL: https://apiservices.ntrs.com/ent/v1
