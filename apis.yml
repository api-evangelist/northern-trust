- aid: northern-trust:risk-and-performance-api
  name: Northern Trust Risk and Performance API
  description: >-
    The Risk and Performance API exposes Northern Trust's investment risk and
    performance measurement data — performance returns, attribution, benchmarks,
    and risk analytics produced by the firm's performance and analytics
    servicing. It is one of the asset-servicing domains in the Northern Trust API
    Store and is served through the enterprise API gateway. The full API
    reference is available as a downloadable specification to registered,
    Okta-authenticated portal users, and the product domain is publicly listed in
