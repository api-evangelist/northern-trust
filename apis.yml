- aid: northern-trust:middle-office-api
  name: Northern Trust Middle Office API
  description: >-
    The Middle Office API surfaces Northern Trust's whole-office and middle-office
    outsourcing data — trade lifecycle, post-trade processing, position keeping,
    reconciliation, and investment operations datasets that support the firm's
    front-, middle- and back-office asset-servicing offering. It is one of the
    domains published in the Northern Trust API Store and is served via the
    enterprise API gateway. The full API reference is downloadable as a
    specification to registered, Okta-authenticated users; the domain landing is
    publicly listed in the catalog.
  humanURL: https://developer.ntrs.com/apis
