- aid: northern-trust:transfer-agency-api
  name: Northern Trust Transfer Agency API
  description: >-
    The Transfer Agency API provides programmatic access to Northern Trust's
    transfer agency servicing — shareholder registers, investor transactions,
    subscriptions and redemptions, dealing, and related transfer-agency records
    supporting fund distribution. It is part of the asset-servicing catalog in
    the Northern Trust API Store and runs on the enterprise API gateway.
    Machine-readable API reference is available as a downloadable specification
    to Okta-authenticated portal users, while the product domain itself is
    publicly browsable.
  humanURL: https://developer.ntrs.com/apis
  baseURL: https://apiservices.ntrs.com/ent/v1
