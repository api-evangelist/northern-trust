- aid: northern-trust:data-management-api
  name: Northern Trust Data Management API
  description: >-
    The Data Management API delivers consolidated investment and reference data
    from Northern Trust's data services — investment book of record, aggregated
    holdings, reference and market data, and cross-domain datasets that let
    clients pull their custody and servicing data into their own systems. It is a
    core domain of the Northern Trust API Store and is delivered through the
    enterprise API gateway. Detailed API reference is provided as a downloadable
    specification to Okta-authenticated portal users; the domain is publicly
    browsable in the catalog.
  humanURL: https://developer.ntrs.com/apis
