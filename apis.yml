apis:
- aid: northern-trust:custody-api
  name: Northern Trust Custody API
  description: >-
    The Custody API in the Northern Trust API Store gives institutional clients
    programmatic access to global custody data — holdings, positions, safekept
    assets, settlements, and account-level custody information across Northern
    Trust's global custody network. It is part of Northern Trust's asset-servicing
    API family and is served through the enterprise API gateway. Full request and
    response reference is published as a downloadable specification inside the
    portal after Okta-based registration; the product landing and domain
    description are publicly browsable.
  humanURL: https://developer.ntrs.com/apis
  baseURL: https://apiservices.ntrs.com/ent/v1
  tags:
  - United States
  - Asset Servicing
  - Custody
  - Securities Services
  - Institutional
  properties:
  - type: DeveloperPortal
    url: https://developer.ntrs.com/apis
  - type: Documentation
    url: https://developer.ntrs.com/get-started
- aid: northern-trust:fund-accounting-api
  name: Northern Trust Fund Accounting API
  description: >-
    The Fund Accounting API exposes Northern Trust's fund accounting and net
    asset value (NAV) servicing data to institutional and fund clients — book of
    record accounting, valuations, income, expenses, and NAV-related datasets
    that support registered and unregistered fund administration. It is one of
    the asset-servicing domains published in the Northern Trust API Store and is
    delivered through the enterprise API gateway. The detailed API reference is
    downloadable as a specification to registered, Okta-authenticated portal
    users; the domain is publicly listed in the catalog.
  humanURL: https://developer.ntrs.com/apis
  baseURL: https://apiservices.ntrs.com/ent/v1
  tags:
  - United States
  - Asset Servicing
  - Fund Accounting
  - Fund Services
